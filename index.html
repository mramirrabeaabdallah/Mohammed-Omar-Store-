const db=async(path,opts={})=>{
  const r=await fetch(SURL+"/rest/v1/"+path,{

// حفظ الإعدادات في Supabase
const saveSettingsDB=async(s)=>{
  try{
    // نطلب الصف المُحدَّث للتأكد من أن PATCH أثّر فعلاً على صف موجود
    const updated=await db("settings?id=eq.main",{method:"PATCH",body:JSON.stringify({data:s}),prefer:"return=representation"});
    if(!updated||updated.length===0){
      // لا يوجد صف "main" بعد → ننشئه
      await db("settings",{method:"POST",body:JSON.stringify({id:"main",data:s}),prefer:"return=minimal"});
    }
  }catch(e){
    // إذا فشل الـPATCH (مثلاً خطأ شبكة/صلاحيات) جرّب INSERT كحل بديل
    try{await db("settings",{method:"POST",body:JSON.stringify({id:"main",data:s}),prefer:"return=minimal"});}catch(e2){}
  }
};

function Login({onLogin,settings}){

// ── StockBar ──
function SB({s,m}){
  const max=Math.max(s*2,m*3,20);
  const pct=Math.min((s/max)*100,100);
  const c=sc(s,m);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:12,fontWeight:700}}>{s}</span>
        <span style={{fontSize:10,color:"#4A5E7A"}}>حد:{m}</span>
      </div>
      <div style={{background:"#0B1120",borderRadius:99,height:5,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:c,borderRadius:99}}/>
      </div>
    </div>
  );
}

  w.document.write('<div class="np" style="padding:12px;background:#f0f4ff;text-align:center;border-bottom:1px solid #dde"><button class="pbtn" onclick="window.print()">🖨️ طباعة</button></div>');
  w.document.write('<div class="pg"><div class="hdr"><div><div class="sn">'+logoHtml+S.storeName+'</div><div class="ss">'+S.tagline+'</div>'+storeInfoLines+'</div><div class="in"><div class="n">'+inv.invoiceNo+'</div><div class="d">'+inv.date+'</div></div></div>');

    w.document.write('<tr><td>'+(i+1)+'</td><td style="font-weight:700">'+l.productName+'</td><td>'+l.qty+'</td><td>'+Number(l.price).toLocaleString("ar-EG")+' '+cur+'</td><td class="ttot">'+Number(l.subtotal).toLocaleString("ar-EG")+' '+cur+'</td></tr>');

// ── Pagination Component ──
function Pagination({page,pages,onChange,T}){
  if(pages<=1)return null;
  const ac=T?.accent||"#3B82F6";
  return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:6,padding:"14px 0"}}>
      <button onClick={()=>onChange(1)} disabled={page===1} className="btn" style={{padding:"5px 10px",background:page===1?"#1A2640":"#1A2640",color:page===1?"#3A5070":"#6B8AAF",border:"1px solid #1E2D45",fontSize:12}}>«</button>
      <button onClick={()=>onChange(page-1)} disabled={page===1} className="btn" style={{padding:"5px 12px",background:"#1A2640",color:page===1?"#3A5070":"#6B8AAF",border:"1px solid #1E2D45",fontSize:12}}>‹</button>
      {(()=>{
        const maxBtns=Math.min(pages,5);
        let start=Math.max(1,page-2);
        let end=start+maxBtns-1;
        if(end>pages){end=pages;start=Math.max(1,end-maxBtns+1);}
        const nums=[];
        for(let p=start;p<=end;p++)nums.push(p);
        return nums.map(p=>(
          <button key={p} onClick={()=>onChange(p)} className="btn"
            style={{padding:"5px 10px",background:p===page?ac:"#1A2640",color:p===page?"#fff":"#6B8AAF",border:"1px solid "+(p===page?ac:"#1E2D45"),fontSize:12,minWidth:32}}>
            {p}
          </button>
        ));
      })()}
      <button onClick={()=>onChange(page+1)} disabled={page===pages} className="btn" style={{padding:"5px 12px",background:"#1A2640",color:page===pages?"#3A5070":"#6B8AAF",border:"1px solid #1E2D45",fontSize:12}}>›</button>
      <button onClick={()=>onChange(pages)} disabled={page===pages} className="btn" style={{padding:"5px 10px",background:"#1A2640",color:page===pages?"#3A5070":"#6B8AAF",border:"1px solid #1E2D45",fontSize:12}}>»</button>
      <span style={{fontSize:11,color:"#4A5E7A",marginRight:4}}>{page} / {pages}</span>
    </div>
  );
}

  const saveInv=async()=>{
    if(!invC.trim()){toast("يرجى إدخال اسم العميل","error");return;}
    const valid=invL.filter(l=>l.pid&&+l.qty>0);
    if(!valid.length){toast("أضف منتجاً واحداً على الأقل","error");return;}
    setBusy(true);
    try{
      const lines=valid.map(l=>{const p=products.find(p=>p.id===+l.pid);return{pid:p.id,pname:p.name,qty:+l.qty,price:Number(p.price),sub:Number(p.price)*+l.qty};});
      // ✅ إصلاح #1: تجميع الكمية الإجمالية المطلوبة لكل منتج (في حال تكرار المنتج في أكثر من سطر بالفاتورة)
      const totalQtyByProduct={};
      lines.forEach(l=>{totalQtyByProduct[l.pid]=(totalQtyByProduct[l.pid]||0)+l.qty;});
      // ✅ إصلاح #4: التحقق من المخزون الحالي من قاعدة البيانات مباشرة قبل تأكيد الفاتورة (بالكمية الإجمالية لكل منتج)
      for(const pid of Object.keys(totalQtyByProduct)){
        const [fresh]=await db("products?id=eq."+pid+"&select=stock");
        const need=totalQtyByProduct[pid];
        if(fresh&&need>fresh.stock){
          const pname=(lines.find(l=>String(l.pid)===String(pid))||{}).pname||"";
          toast("الكمية تتجاوز المخزون: "+pname+" (المتاح: "+fresh.stock+"، المطلوب: "+need+")","error");
          setBusy(false);return;
        }
      }
      const sub=lines.reduce((a,l)=>a+l.sub,0);
      const disc=(sub*(+invD||0))/100;
      const afterDisc=sub-disc;
      const taxRate=Number(settings.taxRate)||0;
      const taxAmt=taxRate>0?afterDisc*taxRate/100:0;
      const total=afterDisc+taxAmt;
      const prefix=settings.invoicePrefix||"INV";
      // ✅ إصلاح #1: نجيب أعلى رقم فاتورة من قاعدة البيانات مباشرة لتفادي التكرار عند الحذف
      const allInvs=await db("invoices?select=invoice_no&is_return=eq.false&order=created_at.desc&limit=1");
      let nextNum=1;
      if(allInvs.length>0){
        const last=allInvs[0].invoice_no||"";
        const m=last.match(/(\d+)$/);
        if(m) nextNum=parseInt(m[1],10)+1;
      }
      const no=prefix+"-"+String(nextNum).padStart(4,"0");
      const [ni]=await db("invoices",{method:"POST",body:JSON.stringify({invoice_no:no,customer:invC,total,discount:+invD||0,notes:invN,date:today(),is_return:false,is_credit:invPayType==="credit"})});
      // ✅ إصلاح #5: في حال فشل إضافة بنود الفاتورة، نحذف الفاتورة الناقصة لتجنب ترك سجل بلا بنود
      try{
        await db("invoice_lines",{method:"POST",body:JSON.stringify(lines.map(l=>({invoice_id:ni.id,product_id:l.pid,product_name:l.pname,qty:l.qty,price:l.price,subtotal:l.sub,note:""})))});
      }catch(lineErr){
        await db("invoices?id=eq."+ni.id,{method:"DELETE",prefer:"return=minimal"}).catch(()=>{});
        throw lineErr;
      }
      // ✅ إصلاح #1 و#3: نجيب المخزون الحالي من قاعدة البيانات مباشرة قبل الخصم، ونخصم الكمية الإجمالية لكل منتج دفعة واحدة
      for(const pid of Object.keys(totalQtyByProduct)){
        const [fresh]=await db("products?id=eq."+pid+"&select=stock");
        if(fresh) await db("products?id=eq."+pid,{method:"PATCH",body:JSON.stringify({stock:fresh.stock-totalQtyByProduct[pid]})});
      }
      const ex=customers.find(c=>c.name===invC);
      if(!ex) await db("customers",{method:"POST",body:JSON.stringify({name:invC,phone:"",notes:""})}).catch(()=>{});
      // handle credit payment
      if(invPayType==="credit"){
        const paidNow=invPaidAmt!==""?Math.min(Number(invPaidAmt),total):0;
        if(paidNow>0){
          await db("credit_payments",{method:"POST",body:JSON.stringify({customer_name:invC,amount:paidNow,notes:"دفعة مقدمة مع الفاتورة "+no,date:today(),invoice_no:no}),prefer:"return=minimal"}).catch(()=>{});
        }
      }
      toast("✓ فاتورة "+no+" — "+fmt(total)+" ج.م"+(invPayType==="credit"?" 🕐 آجل":""));
      logActivity(userRole,"إصدار فاتورة","فاتورة "+no+" للعميل "+invC+" بإجمالي "+fmt(total)+" "+settings.currency+(invPayType==="credit"?" [آجل]":""));
      setInvC("");setInvN("");setInvD(0);setInvL([{pid:"",qty:""}]);setInvPayType("cash");setInvPaidAmt("");setModal(null);
      await load();
    }catch(e){toast("حدث خطأ","error");}
    setBusy(false);
  };

      try{data=JSON.parse(await file.text());}
      catch(e){toast("الملف تالف أو ليس JSON صالح","error");setBusy(false);return;}
      if(!Array.isArray(data.products)||!Array.isArray(data.invoices)){
        toast("ملف غير صالح — لا يحتوي على products أو invoices","error");setBusy(false);return;
      }
      if(data.products.length===0&&data.invoices.length===0){
        toast("الملف فارغ، لم يتم استيراد أي شيء","error");setBusy(false);return;
      }

      // ② حذف البيانات القديمة (بترتيب يحترم الروابط)
      await db("invoice_lines?id=gt.0",{method:"DELETE",prefer:"return=minimal"});
      await db("purchases?id=gt.0",{method:"DELETE",prefer:"return=minimal"}).catch(()=>{});
      await db("invoices?id=gt.0",{method:"DELETE",prefer:"return=minimal"});
      await db("products?id=gt.0",{method:"DELETE",prefer:"return=minimal"});
      await db("customers?id=gt.0",{method:"DELETE",prefer:"return=minimal"}).catch(()=>{});
      await db("suppliers?id=gt.0",{method:"DELETE",prefer:"return=minimal"}).catch(()=>{});

      // ③ استيراد البيانات الجديدة مع عرض التقدم
      const errs=[];

      // العملاء
      if(data.customers?.length) await db("customers",{method:"POST",body:JSON.stringify(data.customers.map(c=>pick(c,["name","phone","notes"])))}).catch(e=>errs.push("عملاء: "+e.message));

      // الموردون
      const suppMap={};
      for(const s of (data.suppliers||[])){
        try{const [ns]=await db("suppliers",{method:"POST",body:JSON.stringify(pick(s,["name","phone","notes"]))});if(ns)suppMap[s.id]=ns.id;}
        catch(e){errs.push("مورد «"+s.name+"»: "+e.message);}
      }

      // المنتجات
      const prodMap={};
      for(const p of data.products){
        try{const [np]=await db("products",{method:"POST",body:JSON.stringify({name:p.name,sku:p.sku,category:p.category||"",price:p.price||0,cost:p.cost||0,stock:p.stock||0,min_stock:p.min_stock||5,unit:p.unit||"قطعة",expiry:p.expiry||null,notes:p.notes||""})});prodMap[p.id]=np.id;}
        catch(e){errs.push("منتج «"+p.name+"»: "+e.message);}
      }

      // المشتريات
      for(const pu of (data.purchases||[])){
        await db("purchases",{method:"POST",body:JSON.stringify({product_id:prodMap[pu.product_id]||null,product_name:pu.product_name,qty:pu.qty,cost_price:pu.cost_price,supplier_id:pu.supplier_id?(suppMap[pu.supplier_id]||null):null,notes:pu.notes||"",date:pu.date,total:pu.total})}).catch(e=>errs.push("مشترى: "+e.message));
      }

      // الفواتير وبنودها
      for(const inv of data.invoices){
        try{
          const [ni]=await db("invoices",{method:"POST",body:JSON.stringify({invoice_no:inv.invoice_no,customer:inv.customer,total:inv.total,discount:inv.discount||0,notes:inv.notes||"",date:inv.date,is_return:inv.is_return||false})});
          const lines=(inv.lines||[]).map(l=>({invoice_id:ni.id,product_id:prodMap[l.product_id]||null,product_name:l.product_name,qty:l.qty,price:l.price,subtotal:l.subtotal,note:l.note||""}));
          if(lines.length) await db("invoice_lines",{method:"POST",body:JSON.stringify(lines)});
        }catch(e){errs.push("فاتورة «"+inv.invoice_no+"»: "+e.message);}
      }

      if(errs.length>0){
        toast("⚠️ تمت الاستعادة مع "+errs.length+" خطأ","warning");
        console.warn("Import errors:",errs);
      }else{
        toast("✓ تمت الاستعادة الكاملة بنجاح");
      }
      logActivity(userRole,"استعادة نسخة احتياطية","منتجات:"+data.products.length+" فواتير:"+data.invoices.length);
      setModal(null);await load();

              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontSize:11,color:"#4A5E7A",marginBottom:3}}>من تاريخ</div>
                  <input type="date" value={ifrom} onChange={e=>setIfrom(e.target.value)} style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"1.5px solid #1E2D45",background:"#0B1120",color:"#E2E8F0",fontSize:12,direction:"ltr"}}/>
                </div>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontSize:11,color:"#4A5E7A",marginBottom:3}}>إلى تاريخ</div>
                  <input type="date" value={ito} onChange={e=>setIto(e.target.value)} style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"1.5px solid #1E2D45",background:"#0B1120",color:"#E2E8F0",fontSize:12,direction:"ltr"}}/>
                </div>

                  <div style={{fontSize:11,color:"#4A5E7A",marginBottom:3}}>اسم العميل</div>

                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{setIfrom("");setIto("");setIcust("");}} className="btn" style={{background:"#1A2640",border:"1px solid #1E2D45",color:"#6B8AAF",fontSize:12,padding:"7px 11px"}}>مسح</button>
                  {can("exportInvoices")&&<button onClick={()=>exportCSV(filtInvs.filter(i=>!i.is_return))} className="btn" style={{background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontSize:12,padding:"7px 11px"}}>📥 Excel</button>}
                  {can("exportInvoices")&&<button onClick={()=>printPeriodReport("تقرير المبيعات",ifrom||"البداية",ito||"اليوم",filtInvs,products,settings)} className="btn" style={{background:"linear-gradient(135deg,#8B5CF6,#6D28D9)",color:"#fff",fontSize:12,padding:"7px 11px"}}>🖨️ تقرير PDF</button>}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              {[{l:"المبيعات",v:fmt(filtInvs.filter(i=>!i.is_return).reduce((a,i)=>a+Number(i.total),0))+" ج.م",c:"#3B82F6"},{l:"المرتجعات",v:"- "+fmt(filtInvs.filter(i=>i.is_return).reduce((a,i)=>a+Number(i.total),0))+" ج.م",c:"#EF4444"},{l:"الصافي",v:fmt(filtInvs.filter(i=>!i.is_return).reduce((a,i)=>a+Number(i.total),0)-filtInvs.filter(i=>i.is_return).reduce((a,i)=>a+Number(i.total),0))+" ج.م",c:"#10B981"}].map(s=>(
                <div key={s.l} className="card" style={{padding:"12px 16px",flex:1,minWidth:130}}>
                  <div style={{fontSize:11,color:"#4A5E7A",marginBottom:3}}>{s.l}</div>
                  <div style={{fontSize:17,fontWeight:800,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:10,color:"#3A5070"}}>{filtInvs.filter(i=>!i.is_return).length} فاتورة</div>
                </div>
              ))}
            </div>
            <div className="card" style={{overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{background:"#1A2640"}}>

                  </tr></thead>
                  <tbody>
                    {pagedInvs.map((inv,i)=>(
                      <tr key={inv.id} className="tbl-row" style={{borderBottom:"1px solid #18253A",cursor:"pointer"}}

                        onMouseEnter={e=>{e.currentTarget.style.background=T.hdr;}}
                        onMouseLeave={e=>{e.currentTarget.style.background="";}}>
                        <td style={{padding:"9px 12px",color:T.dim}}>{(invPage-1)*PAGE_SIZE+i+1}</td>
                        <td style={{padding:"9px 12px",fontWeight:700,color:inv.is_return?"#EF4444":"#6B8AAF"}}>{inv.invoiceNo}{inv.is_credit&&!inv.is_return?<span style={{marginRight:4,background:"#F59E0B22",color:"#F59E0B",fontSize:9,borderRadius:4,padding:"1px 5px"}}>آجل</span>:null}</td>
                        <td style={{padding:"9px 12px",fontWeight:600,color:T.text}}>{inv.customer}</td>
                        <td style={{padding:"9px 12px",color:T.sub,maxWidth:180}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(inv.lines||[]).map(l=>l.productName+"×"+l.qty).join("، ")}</div></td>
                        <td style={{padding:"9px 12px",fontWeight:800,color:inv.is_return?"#EF4444":"#10B981"}}>{inv.is_return?"-":""}{fmt(inv.total)} ج.م</td>
                        <td style={{padding:"9px 12px",color:T.sub}}>{inv.date}</td>
                        <td style={{padding:"9px 12px",color:"#3B82F6",fontSize:16}}>›</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {filtInvs.length===0&&<div style={{padding:"40px",textAlign:"center",color:T.dim,fontSize:13}}>لا توجد فواتير بهذه الفلاتر</div>}
              </div>
            </div>
            <Pagination page={invPage} pages={invPages} onChange={setInvPage}/>
          </div>
        )}

        {/* CUSTOMERS */}
        {tab==="custs"&&(
          <div>
            {/* ملخص الديون */}
            {(()=>{const debtors=custCreditStats.filter(c=>c.remaining>0);const totalDebt=debtors.reduce((a,c)=>a+c.remaining,0);return debtors.length>0?(
              <div className="card" style={{padding:"12px 16px",marginBottom:12,borderColor:"#EF444444",background:"#1A0500"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:800,color:"#EF4444"}}>💳 الديون المستحقة ({debtors.length} عميل)</div>
                  <div style={{fontSize:14,fontWeight:800,color:"#EF4444"}}>{fmt(totalDebt)} ج.م</div>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {debtors.slice(0,6).map(c=>(
                    <span key={c.id} onClick={()=>{setMd(c);setModal("vC");}} style={{background:"#2A0800",border:"1px solid #EF444433",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#F87171"}}>
                      {c.name}: {fmt(c.remaining)} ج.م
                    </span>
                  ))}
                  {debtors.length>6&&<span style={{fontSize:11,color:"#6B8AAF"}}>+ {debtors.length-6} آخرين</span>}
                </div>
              </div>
            ):null;})()}
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12,gap:8,alignItems:"center"}}>
              {!can("addCustomer")&&<div style={{fontSize:12,color:T.sub,background:T.hdr,border:"1px solid "+T.border,borderRadius:8,padding:"6px 12px"}}>💡 العملاء الجدد يُضافون تلقائياً عند إنشاء الفاتورة</div>}
              {can("addCustomer")&&<button className="btn" onClick={()=>{setCf({name:"",phone:"",notes:""});setMd(null);setModal("addC");}} style={{background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",color:"#fff",fontSize:13}}>+ عميل جديد</button>}
            </div>
            {custCreditStats.length===0?<div className="card" style={{padding:"48px",textAlign:"center",color:"#3A5070"}}>لا يوجد عملاء بعد</div>:filteredCustStats.length===0?<div className="card" style={{padding:"48px",textAlign:"center",color:"#3A5070"}}>لا توجد نتائج مطابقة للبحث</div>:(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
                {filteredCustStats.map(c=>(
                  <div key={c.id} className="card" style={{padding:"14px",cursor:"pointer",borderColor:c.remaining>0?"#F59E0B44":"#1E2D45"}}
                    onClick={()=>{setMd(c);setModal("vC");}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#3B82F644";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=c.remaining>0?"#F59E0B44":"#1E2D45";}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:800,color:"#E2E8F0"}}>{c.name}</div>
                        {c.phone&&<div style={{fontSize:12,color:"#4A5E7A",marginTop:2}}>📞 {c.phone}</div>}
                      </div>
                      <div style={{fontSize:26}}>{c.remaining>0?"💳":"👤"}</div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-around",paddingTop:8,borderTop:"1px solid #1A2640"}}>
                      <div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:800,color:"#3B82F6"}}>{fmt(c.totalInvoiced)} ج.م</div><div style={{fontSize:10,color:"#4A5E7A"}}>إجمالي</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:800,color:"#10B981"}}>{fmt(c.totalPaid)} ج.م</div><div style={{fontSize:10,color:"#4A5E7A"}}>مدفوع</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:800,color:c.remaining>0?"#EF4444":"#10B981"}}>{fmt(c.remaining)} ج.م</div><div style={{fontSize:10,color:"#4A5E7A"}}>متبقي</div></div>
                    </div>
                    {c.remaining>0&&<div style={{marginTop:8,background:"#1A0800",border:"1px solid #F59E0B33",borderRadius:7,padding:"4px 8px",fontSize:11,color:"#F59E0B",textAlign:"center"}}>⏳ عليه دين</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* SUPPLIERS */}
        {tab==="supps"&&(
          <div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
              {can("addSupplier")&&<button className="btn" onClick={()=>{setSf({name:"",phone:"",notes:""});setMd(null);setModal("addS");}} style={{background:"linear-gradient(135deg,#8B5CF6,#6D28D9)",color:"#fff",fontSize:13}}>+ مورد جديد</button>}
            </div>
            {suppliers.length===0?<div className="card" style={{padding:"48px",textAlign:"center",color:"#3A5070"}}>لا يوجد موردين بعد</div>:filteredSuppliers.length===0?<div className="card" style={{padding:"48px",textAlign:"center",color:"#3A5070"}}>لا توجد نتائج مطابقة للبحث</div>:(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:10}}>
                {filteredSuppliers.map(s=>{
                  const sp=purchases.filter(p=>p.supplier_id===s.id);
                  const st=sp.reduce((a,p)=>a+Number(p.total),0);
                  return(
                    <div key={s.id} className="card" style={{padding:"14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                        <div>
                          <div style={{fontSize:14,fontWeight:800,color:"#E2E8F0"}}>{s.name}</div>
                          {s.phone&&<div style={{fontSize:12,color:"#4A5E7A",marginTop:2}}>📞 {s.phone}</div>}
                        </div>
                        <div style={{fontSize:26}}>🚚</div>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-around",paddingTop:8,borderTop:"1px solid #1A2640",marginBottom:10}}>
                        <div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:800,color:"#8B5CF6"}}>{fmt(st)} ج.م</div><div style={{fontSize:10,color:"#4A5E7A"}}>المشتريات</div></div>
                        <div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:800,color:"#F59E0B"}}>{sp.length}</div><div style={{fontSize:10,color:"#4A5E7A"}}>عملية</div></div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        {can("editSupplier")&&<button onClick={e=>{e.stopPropagation();setSf({name:s.name,phone:s.phone||"",notes:s.notes||""});setMd(s);setModal("editS");}} className="btn" style={{flex:1,background:"#1A2640",color:"#8B5CF6",border:"1px solid #1E2D45",fontSize:12,padding:"6px"}}>تعديل</button>}
                        {can("addPurchase")&&<button onClick={e=>{e.stopPropagation();setPurF({pid:"",qty:"",cost:"",price:"",sid:s.id,notes:""});setModal("pur");}} className="btn" style={{flex:1,background:"linear-gradient(135deg,#8B5CF6,#6D28D9)",color:"#fff",fontSize:12,padding:"6px"}}>+ شراء</button>}
                        {can("deleteSupplier")&&<button onClick={e=>{e.stopPropagation();setMd(s);delSupp(s);}} className="btn" style={{background:"#1A0000",border:"1px solid #EF444433",color:"#EF4444",fontSize:12,padding:"6px 10px"}}>🗑️</button>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* REPORTS */}
        {tab==="rep"&&(
          <div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
              {[{v:"today",l:"اليوم"},{v:"week",l:"أسبوع"},{v:"month",l:"شهر"},{v:"year",l:"سنة"}].map(r=>(
                <button key={r.v} onClick={()=>setRng(r.v)} className="btn" style={{background:rng===r.v?"#3B82F6":"#131C2E",color:rng===r.v?"#fff":"#6B8AAF",border:"1px solid #1E2D45",fontSize:13}}>{r.l}</button>
              ))}
              <button onClick={()=>setModal("crep")} className="btn" style={{background:"linear-gradient(135deg,#8B5CF6,#6D28D9)",color:"#fff",fontSize:12}}>📋 تقرير عميل</button>
              {can("exportInvoices")&&<button onClick={()=>exportCSV(reportInvs)} className="btn" style={{background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontSize:12}}>📥 Excel</button>}
              {can("exportInvoices")&&<button onClick={()=>{const labels={today:"اليوم",week:"الأسبوع",month:"الشهر",year:"السنة"};const earliest=reportInvs.length?reportInvs.reduce((a,i)=>i.date<a?i.date:a,reportInvs[0].date):today();printPeriodReport("تقرير "+labels[rng],earliest,today(),reportInvs,products,settings);}} className="btn" style={{background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#fff",fontSize:12}}>🖨️ طباعة PDF</button>}
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
              <KPI label="إيرادات الفترة" value={fmt(reportInvs.reduce((a,i)=>a+Number(i.total),0))+" ج.م"} sub={reportInvs.length+" فاتورة"} icon="💰" color="#3B82F6"/>
              {can("viewCost")&&<KPI label="أرباح الفترة" value={fmt(reportInvs.reduce((a,inv)=>a+(inv.lines||[]).reduce((b,l)=>{const p=products.find(p=>p.id===l.productId);return b+(p?(Number(l.price)-Number(p.cost))*Number(l.qty):0);},0),0))+" ج.م"} icon="📈" color="#10B981"/>}
              {can("viewCost")&&<KPI label="قيمة المخزون" value={fmt(invVal)+" ج.م"} icon="📦" color="#8B5CF6"/>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div className="card" style={{padding:"16px"}}>
                <div style={{fontSize:13,fontWeight:800,color:"#E2E8F0",marginBottom:12}}>📦 أداء المنتجات</div>
                {prodPerf.filter(p=>p.rev>0).map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1A2640",fontSize:12}}>
                    <div><div style={{fontWeight:600,color:"#B0C0D8"}}>{p.name}</div><div style={{fontSize:10,color:"#4A5E7A"}}>{p.qty} {p.unit||"قطعة"}</div></div>
                    <div style={{textAlign:"left"}}><div style={{fontWeight:700,color:"#3B82F6"}}>{fmt(p.rev)}</div>{can("viewCost")&&<div style={{fontSize:11,color:p.profit>=0?"#10B981":"#EF4444"}}>{fmt(p.profit)}</div>}</div>
                  </div>
                ))}
                {prodPerf.filter(p=>p.rev>0).length===0&&<div style={{color:"#3A5070",textAlign:"center",padding:"12px",fontSize:12}}>لا توجد بيانات</div>}
              </div>
              <div className="card" style={{padding:"16px"}}>
                <div style={{fontSize:13,fontWeight:800,color:"#E2E8F0",marginBottom:12}}>👥 أفضل العملاء</div>
                {custStats.filter(c=>c.total>0).slice(0,8).map((c,i)=>(
                  <div key={c.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1A2640",fontSize:12}}>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{color:"#3A5070",fontSize:11}}>#{i+1}</span><div><div style={{fontWeight:600,color:"#B0C0D8"}}>{c.name}</div><div style={{fontSize:10,color:"#4A5E7A"}}>{c.count} فاتورة</div></div></div>
                    <div style={{fontWeight:700,color:"#3B82F6"}}>{fmt(c.total)}</div>
                  </div>
                ))}
                {custStats.filter(c=>c.total>0).length===0&&<div style={{color:"#3A5070",textAlign:"center",padding:"12px",fontSize:12}}>لا توجد بيانات</div>}
              </div>
            </div>
          </div>
        )}

        {/* ACTIVITY LOG */}
        {tab==="log"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:15,fontWeight:800,color:"#E2E8F0"}}>📋 سجل العمليات</div>
              <button onClick={load} className="btn" style={{background:"#1A2640",border:"1px solid #1E2D45",color:"#6B8AAF",fontSize:12,padding:"6px 12px"}}>🔄 تحديث</button>
            </div>
            {userRole==="manager"&&<div className="card" style={{padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:800,color:"#7A8EAE",marginBottom:8}}>🗑️ حذف فترات من السجل</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontSize:11,color:"#4A5E7A",marginBottom:3}}>من تاريخ</div>
                  <input type="date" value={logFrom} onChange={e=>setLogFrom(e.target.value)} style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"1.5px solid #1E2D45",background:"#0B1120",color:"#E2E8F0",fontSize:12,direction:"ltr"}}/>
                </div>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontSize:11,color:"#4A5E7A",marginBottom:3}}>إلى تاريخ</div>
                  <input type="date" value={logTo} onChange={e=>setLogTo(e.target.value)} style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"1.5px solid #1E2D45",background:"#0B1120",color:"#E2E8F0",fontSize:12,direction:"ltr"}}/>
                </div>
                <div style={{display:"flex",gap:6}}>
                  {(logFrom||logTo)&&<button onClick={()=>{setLogFrom("");setLogTo("");}} className="btn" style={{background:"#1A2640",border:"1px solid #1E2D45",color:"#6B8AAF",fontSize:12,padding:"7px 11px"}}>مسح</button>}
                  <button onClick={delActLog} disabled={busy} className="btn" style={{background:busy?"#1A2640":"linear-gradient(135deg,#EF4444,#B91C1C)",color:"#fff",fontSize:12,padding:"7px 14px"}}>
                    {logFrom||logTo?"🗑️ حذف الفترة المحددة":"🗑️ حذف كل السجل"}
                  </button>
                </div>
              </div>
              <div style={{fontSize:10,color:"#3A5070",marginTop:6}}>اتركهما فارغين لحذف كل السجل دفعة واحدة.</div>
            </div>}
            <div className="card" style={{overflow:"hidden"}}>
              {actLog.length===0?<div style={{padding:"40px",textAlign:"center",color:"#3A5070",fontSize:13}}>لا توجد عمليات بعد</div>:(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{background:"#1A2640"}}>
                      {["الدور","العملية","التفاصيل","الوقت"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:"#4A5E7A",borderBottom:"1px solid #1E2D45",whiteSpace:"nowrap"}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {actLog.map((l,i)=>{
                        const r=ROLES[l.user_role];
                        return(
                          <tr key={l.id||i} style={{borderBottom:"1px solid #18253A"}}>
                            <td style={{padding:"9px 12px"}}>
                              <span style={{background:(r?.color||"#6B8AAF")+"22",color:r?.color||"#6B8AAF",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700}}>{r?.icon||"?"} {r?.label||l.user_role}</span>
                            </td>
                            <td style={{padding:"9px 12px",fontWeight:700,color:"#E2E8F0"}}>{l.action}</td>
                            <td style={{padding:"9px 12px",color:"#6B8AAF",maxWidth:220}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.details||"—"}</div></td>
                            <td style={{padding:"9px 12px",color:"#4A5E7A",whiteSpace:"nowrap"}}>{new Date(l.created_at).toLocaleString("ar-EG",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        )}

        const custPays=creditPayments.filter(p=>p.customer_name===cst.name&&(!stmtFrom||p.date>=stmtFrom)&&(!stmtTo||p.date<=stmtTo));
        // merge timeline
        const timeline=[
          ...custInvs.map(i=>({type:"inv",date:i.date,label:i.invoiceNo,amount:Number(i.total),obj:i})),
          ...custRets.map(i=>({type:"ret",date:i.date,label:i.invoiceNo,amount:Number(i.total),obj:i})),
          ...custPays.map(p=>({type:"pay",date:p.date,label:p.notes||"دفعة",amount:Number(p.amount),obj:p})),
        ].sort((a,b)=>a.date<b.date?-1:1);
        let running=0;
        const rows=timeline.map(r=>{
          if(r.type==="inv") running+=r.amount;
          else if(r.type==="ret") running-=r.amount;
          else running-=r.amount;
          return{...r,balance:running};

        const periodTotal=custInvs.reduce((a,i)=>a+Number(i.total),0)-custRets.reduce((a,i)=>a+Number(i.total),0);

              </div>
              <div style={{flex:1,minWidth:130}}>
                <div style={{fontSize:10,color:"#4A5E7A",marginBottom:3}}>إلى</div>

                  <div key={s.l} style={{flex:1,background:"#1A2640",borderRadius:7,padding:"6px 8px",textAlign:"center"}}>

              w.document.write('<table><thead><tr><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr></thead><tbody>');
              rows.forEach(r=>{w.document.write('<tr><td>'+r.date+'</td><td>'+(r.type==="pay"?"دفعة: "+r.label:r.type==="ret"?"مرتجع: "+r.label:"فاتورة: "+r.label)+'</td><td style="color:#dc2626;font-weight:700">'+(r.type==="inv"?fmt(r.amount)+" "+cur:"—")+'</td><td style="color:#059669;font-weight:700">'+(r.type!=="inv"?fmt(r.amount)+" "+cur:"—")+'</td><td style="font-weight:800;color:'+(r.balance>0?"#dc2626":"#059669")+'">'+fmt(Math.abs(r.balance))+" "+cur+'</td></tr>');});
              w.document.write('</tbody></table><div style="margin-top:16px;text-align:center;font-size:11px;color:#999">'+settings.footer+'</div></body></html>');
              w.document.close();w.print();
            }} className="btn" style={{flex:1,padding:"9px",background:"linear-gradient(135deg,#8B5CF6,#6D28D9)",color:"#fff",fontSize:12}}>🖨️ طباعة</button>
            {can("deleteCustomer")&&<button onClick={()=>delCust(cst)} className="btn" style={{padding:"9px 12px",background:"#1A0000",border:"1px solid #EF444433",color:"#EF4444",fontSize:12}}>🗑️</button>}
          </div>
        </Modal>
        );
      })()}

      {(modal==="addS"||modal==="editS")&&(

          <button onClick={saveSupp} disabled={busy} className="btn" style={{width:"100%",padding:"12px",background:busy?"#1A2640":"linear-gradient(135deg,#8B5CF6,#6D28D9)",color:"#fff",fontSize:14,borderRadius:12}}>

      {modal==="crep"&&(
        <Modal title="تقرير مشتريات عميل" sub="اختر العميل والفترة" onClose={()=>setModal(null)}>

                <div style={{display:"flex",justifyContent:"space-around",marginBottom:9}}>
                  {[{l:"الفواتير",v:list.length,c:"#3B82F6"},{l:"الإجمالي",v:fmt(total)+" ج.م",c:"#10B981"},{l:"المتوسط",v:fmt(list.length?Math.round(total/list.length):0)+" ج.م",c:"#F59E0B"}].map(s=>(

          {!cpUnlocked?(
            <div>
              <F label="كلمة سر لوحة التحكم" type="password" value={cpPass} onChange={e=>setCpPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&checkCpPass()}
                placeholder="••••••" style={{textAlign:"center",border:"1.5px solid "+(cpErr?"#EF4444":"#1E2D45")}}/>
              {cpErr&&<div style={{color:"#EF4444",fontSize:12,marginBottom:8,textAlign:"center"}}>كلمة السر غير صحيحة</div>}
              <button onClick={checkCpPass} className="btn" style={{width:"100%",padding:"11px",background:`linear-gradient(135deg,${settings.accentColor||"#3B82F6"},#7C3AED)`,color:"#fff",fontSize:14}}>دخول 🔓</button>
            </div>
          ):(
            <div>
              <F label="اسم المتجر" value={stForm.storeName} onChange={e=>setStForm(f=>({...f,storeName:e.target.value}))}/>
              <F label="الوصف التوضيحي (يظهر أسفل اسم المتجر)" value={stForm.tagline} onChange={e=>setStForm(f=>({...f,tagline:e.target.value}))}/>

              <div style={{marginBottom:12}}>
                <label style={{display:"block",fontSize:12,fontWeight:700,color:"#7A8EAE",marginBottom:6}}>شعار المتجر</label>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <div style={{width:48,height:48,borderRadius:10,background:"#0B1120",border:"1.5px solid #1E2D45",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,overflow:"hidden",flexShrink:0}}>
                    {stForm.logoImg?<img src={stForm.logoImg} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:stForm.logo}
                  </div>
                  <div style={{flex:1,display:"flex",gap:6}}>
                    <input ref={logoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleLogoUpload(e.target.files[0])}/>
                    <button onClick={()=>logoInputRef.current?.click()} className="btn" style={{flex:1,background:"#1A2640",color:"#E2E8F0",fontSize:12,padding:"9px"}}>📤 رفع صورة</button>
                    {stForm.logoImg&&<button onClick={()=>setStForm(f=>({...f,logoImg:""}))} className="btn" style={{background:"#1A2640",color:"#EF4444",fontSize:12,padding:"9px 12px"}}>حذف</button>}
                  </div>
                </div>
                {!stForm.logoImg&&
                  <F label="أو اكتب إيموجي كشعار" value={stForm.logo} maxLength={4} onChange={e=>setStForm(f=>({...f,logo:e.target.value}))} style={{textAlign:"center",fontSize:20}}/>}
              </div>

              <F label="رمز العملة" value={stForm.currency} onChange={e=>setStForm(f=>({...f,currency:e.target.value}))} hint="مثال: ج.م"/>
              <TA label="نص ختام الفاتورة ورسائل واتساب" value={stForm.footer} onChange={e=>setStForm(f=>({...f,footer:e.target.value}))}/>

              {/* ── قسم: معلومات المتجر في الفواتير ── */}
              <div style={{borderTop:"1px solid #1E2D45",paddingTop:12,marginTop:4,marginBottom:4}}>
                <div style={{fontSize:12,fontWeight:800,color:"#3B82F6",marginBottom:10}}>🏢 معلومات المتجر في الفواتير</div>
                <F label="عنوان المتجر" value={stForm.storeAddress||""} onChange={e=>setStForm(f=>({...f,storeAddress:e.target.value}))} placeholder="مثال: شارع النصر، القاهرة"/>
                <F label="رقم الهاتف" value={stForm.storePhone||""} onChange={e=>setStForm(f=>({...f,storePhone:e.target.value}))} placeholder="مثال: 01012345678"/>
                <F label="الرقم الضريبي" value={stForm.storeTaxNo||""} onChange={e=>setStForm(f=>({...f,storeTaxNo:e.target.value}))} placeholder="مثال: 123-456-789"/>
              </div>

              {/* ── قسم: ترقيم وضريبة الفواتير ── */}
              <div style={{borderTop:"1px solid #1E2D45",paddingTop:12,marginTop:4,marginBottom:4}}>
                <div style={{fontSize:12,fontWeight:800,color:"#10B981",marginBottom:10}}>🧾 ترقيم وضريبة الفواتير</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
                  <F label="بادئة رقم الفاتورة" value={stForm.invoicePrefix||"INV"} onChange={e=>setStForm(f=>({...f,invoicePrefix:e.target.value}))} placeholder="INV" hint={"مثال: "+( stForm.invoicePrefix||"INV")+"-0001"}/>
                  <F label="نسبة الضريبة %" type="number" value={stForm.taxRate||"0"} onChange={e=>setStForm(f=>({...f,taxRate:e.target.value}))} placeholder="0" hint="0 = بدون ضريبة"/>
                </div>
              </div>

              {/* ── قسم: كلمة سر لوحة التحكم ── */}
              <div style={{borderTop:"1px solid #1E2D45",paddingTop:12,marginTop:4,marginBottom:4}}>
                <div style={{fontSize:12,fontWeight:800,color:"#F59E0B",marginBottom:10}}>🔐 كلمات السر</div>
                <F label="كلمة سر المدير (الدخول الرئيسي)" type="text" value={stForm.loginPassword||""} onChange={e=>setStForm(f=>({...f,loginPassword:e.target.value}))}
                  placeholder="اتركها فارغة للإبقاء على الحالية" hint={settings.loginPassword?"محدّدة حالياً":"الافتراضية: amir1234"}/>
                <F label="كلمة سر الكاشير 🧾" type="text" value={stForm.cashierPassword||""} onChange={e=>setStForm(f=>({...f,cashierPassword:e.target.value}))}
                  placeholder="اتركها فارغة للإبقاء على الحالية" hint={settings.cashierPassword?"محدّدة حالياً":"الافتراضية: cashier123"}/>
                <F label="كلمة سر المخزن 📦" type="text" value={stForm.warehousePassword||""} onChange={e=>setStForm(f=>({...f,warehousePassword:e.target.value}))}
                  placeholder="اتركها فارغة للإبقاء على الحالية" hint={settings.warehousePassword?"محدّدة حالياً":"الافتراضية: warehouse123"}/>
                <F label="كلمة سر لوحة التحكم ⚙️" type="text" value={stForm.adminPassword||""} onChange={e=>setStForm(f=>({...f,adminPassword:e.target.value}))}
                  placeholder="اتركها فارغة للإبقاء على الحالية" hint={settings.adminPassword?"محدّدة حالياً":"الافتراضية: mo1234"}/>
              </div>

              {/* ── قسم: صلاحيات الموظفين (الكاشير والمخزن) ── */}
              <div style={{borderTop:"1px solid #1E2D45",paddingTop:12,marginTop:4,marginBottom:4}}>
                <div style={{fontSize:12,fontWeight:800,color:"#06B6D4",marginBottom:10}}>🔒 صلاحيات الموظفين (تفصيلية)</div>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  {["cashier","warehouse"].map(r=>(
                    <button key={r} onClick={()=>setPermRole(r)} className="btn" style={{flex:1,padding:"9px",background:permRole===r?ROLES[r].color+"22":"#0B1120",border:"1.5px solid "+(permRole===r?ROLES[r].color:"#1E2D45"),color:permRole===r?ROLES[r].color:"#6B8AAF",fontSize:13,fontWeight:700}}>
                      {ROLES[r].icon} صلاحيات {ROLES[r].label}
                    </button>
                  ))}
                </div>
                {PERMISSION_GROUPS.map(g=>{
                  const allOn=g.perms.every(p=>formPerms[permRole][p.key]);
                  const allOff=g.perms.every(p=>!formPerms[permRole][p.key]);
                  return(
                  <div key={g.title} style={{background:"#0B1120",border:"1px solid #1E2D45",borderRadius:10,padding:"10px 12px",marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{fontSize:12,fontWeight:800,color:"#9CB4D8"}}>{g.icon} {g.title}</div>
                      <button onClick={()=>setGroupPerms(permRole,g.perms.map(p=>p.key),!allOn)} className="btn" style={{background:"#1A2640",border:"1px solid #1E2D45",color:allOn?"#EF4444":"#10B981",fontSize:11,padding:"4px 9px"}}>
                        {allOn?"إلغاء الكل":"تحديد الكل"}
                      </button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 10px"}}>
                      {g.perms.map(p=>{
                        const on=!!formPerms[permRole][p.key];
                        return(
                          <label key={p.key} onClick={()=>togglePerm(permRole,p.key)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"6px 8px",borderRadius:8,background:on?ROLES[permRole].color+"14":"transparent"}}>
                            <div style={{width:34,height:19,borderRadius:99,background:on?ROLES[permRole].color:"#1E2D45",position:"relative",flexShrink:0,transition:"all .15s"}}>
                              <div style={{width:15,height:15,borderRadius:"50%",background:"#fff",position:"absolute",top:2,right:on?2:17,transition:"all .15s"}}/>
                            </div>
                            <span style={{fontSize:12,color:on?"#E2E8F0":"#6B8AAF"}}>{p.label}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                  );
                })}
                <div style={{fontSize:10,color:"#3A5070",marginTop:2}}>💡 صلاحيات المدير دائماً كاملة ولا تتأثر بهذه الإعدادات. اضغط «✓ حفظ الإعدادات» أدناه لتطبيق التغييرات.</div>
              </div>

              {/* ── قسم: ألوان التطبيق ── */}
              <div style={{borderTop:"1px solid #1E2D45",paddingTop:12,marginTop:4,marginBottom:4}}>
                <div style={{fontSize:12,fontWeight:800,color:"#7C3AED",marginBottom:10}}>🎨 لون التطبيق</div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  {["#3B82F6","#10B981","#7C3AED","#F59E0B","#EF4444","#06B6D4","#EC4899","#F97316"].map(c=>(
                    <div key={c} onClick={()=>setStForm(f=>({...f,accentColor:c}))} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:stForm.accentColor===c?"3px solid #fff":"3px solid transparent",boxSizing:"border-box",flexShrink:0}}/>
                  ))}
                  <input type="color" value={stForm.accentColor||"#3B82F6"} onChange={e=>setStForm(f=>({...f,accentColor:e.target.value}))} style={{width:28,height:28,border:"none",borderRadius:"50%",cursor:"pointer",padding:0,background:"none"}} title="لون مخصص"/>
                </div>
              </div>

              <div style={{display:"flex",gap:8,marginTop:6}}>
                <button onClick={saveSettings} className="btn" style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontSize:14}}>✓ حفظ الإعدادات</button>
                <button onClick={resetSettings} className="btn" style={{flex:1,padding:"12px",background:"#1A2640",color:"#6B8AAF",fontSize:13}}>استعادة الافتراضي</button>
              </div>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
